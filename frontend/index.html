<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bedtime Story Generator</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header><h1>Bedtime Story Generator</h1></header>

    <main class="layout">
        <section class="form-pane" aria-label="Story details">
            <p class="hint">Tell us about the story you'd like to read tonight.</p>
            <form id="story-form">
                <label>
                    Child's name
                    <input name="child_name" required placeholder="Aisha">
                </label>
                <label>
                    Characters
                    <input name="characters" placeholder="an owl and a fox">
                </label>
                <label>
                    Setting
                    <input name="setting" placeholder="an enchanted forest">
                </label>
                <label>
                    Plot
                    <input name="plot" required placeholder="looking for the moon">
                </label>
                <button id="generate-btn" type="button">Generate story</button>
            </form>
            <p id="error" class="error" role="alert"></p>

            <aside id="recent-stories" class="recent-stories" hidden>
                <h2>Past stories</h2>
                <ul id="recent-list"></ul>
            </aside>
        </section>

        <section class="story-pane" aria-label="Story" aria-live="polite">
            <div id="story-output" class="story-empty">
                <p class="placeholder">Your story will appear here.</p>
            </div>
        </section>
    </main>

    <script src="/script.js"></script>
</body>
</html>
